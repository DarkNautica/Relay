# ────────────────────────────────────────────────────────────────────
# Relay Server — Release Workflow
#
# Triggers on git tag push matching v* (e.g. v1.0.0).
# Builds cross-platform binaries and publishes a GitHub Release.
# Builds and pushes Docker images to Docker Hub.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME — Docker Hub username for pushing images
#   DOCKERHUB_TOKEN    — Docker Hub access token (not password)
# ────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.22'

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay-server
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: relay-server/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o relay-${{ matrix.suffix }} ./main.go

      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.suffix }}
          path: relay-server/relay-${{ matrix.suffix }}

  github-release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/relay-*

  docker:
    name: Docker Hub
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: relay-server
          file: relay-server/Dockerfile
          push: true
          no-cache: true
          platforms: linux/amd64,linux/arm64
          tags: |
            relayhq/relay:latest
            relayhq/relay:${{ steps.version.outputs.VERSION }}
